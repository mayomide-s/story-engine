services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/sociopost
      REDIS_URL: redis://redis:6379/0
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-socipost-assets}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-http://localhost:8000/assets}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RUNWAY_API_KEY: ${RUNWAY_API_KEY:-}
      VIDEO_PROVIDER: ${VIDEO_PROVIDER:-mock}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_VIDEO_PROVIDER: ${VIDEO_PROVIDER:-mock}
      VITE_STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
    ports:
      - "5173:5173"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sociopost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sociopost"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery_worker:
    build:
      context: ./backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/sociopost
      REDIS_URL: redis://redis:6379/0
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-http://localhost:8000/assets}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-socipost-assets}
      RUNWAY_API_KEY: ${RUNWAY_API_KEY:-}
      VIDEO_PROVIDER: ${VIDEO_PROVIDER:-mock}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery_beat:
    build:
      context: ./backend
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/sociopost
      REDIS_URL: redis://redis:6379/0
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-socipost-assets}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-http://localhost:8000/assets}
      RUNWAY_API_KEY: ${RUNWAY_API_KEY:-}
      VIDEO_PROVIDER: ${VIDEO_PROVIDER:-mock}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
