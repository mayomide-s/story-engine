services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/sociopost
      REDIS_URL: redis://redis:6379/0
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-socipost-assets}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-http://localhost:8000/assets}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RUNWAY_API_KEY: ${RUNWAY_API_KEY:-}
      SEMANTIC_CRITIC_ENABLED: ${SEMANTIC_CRITIC_ENABLED:-false}
      SEMANTIC_CRITIC_PROVIDER: ${SEMANTIC_CRITIC_PROVIDER:-openai}
      SEMANTIC_CRITIC_MODEL: ${SEMANTIC_CRITIC_MODEL:-gpt-4.1-mini}
      SEMANTIC_CRITIC_VERSION: ${SEMANTIC_CRITIC_VERSION:-v1}
      SEMANTIC_CRITIC_TIMEOUT_SECONDS: ${SEMANTIC_CRITIC_TIMEOUT_SECONDS:-60}
      NARRATION_ENABLED: ${NARRATION_ENABLED:-false}
      NARRATION_WRITER_PROVIDER: ${NARRATION_WRITER_PROVIDER:-mock}
      NARRATION_WRITER_MODEL: ${NARRATION_WRITER_MODEL:-gpt-4.1-mini}
      NARRATION_WRITER_PROMPT_VERSION: ${NARRATION_WRITER_PROMPT_VERSION:-v1}
      NARRATION_SPEECH_PROVIDER: ${NARRATION_SPEECH_PROVIDER:-mock}
      NARRATION_SPEECH_MODEL: ${NARRATION_SPEECH_MODEL:-gpt-4o-mini-tts}
      NARRATION_VOICE: ${NARRATION_VOICE:-alloy}
      NARRATION_VERSION: ${NARRATION_VERSION:-v1}
      NARRATION_CAPTION_VERSION: ${NARRATION_CAPTION_VERSION:-v1}
      NARRATION_RENDER_VERSION: ${NARRATION_RENDER_VERSION:-v1}
      NARRATION_TIMEOUT_SECONDS: ${NARRATION_TIMEOUT_SECONDS:-90}
      NARRATION_MAX_WORDS: ${NARRATION_MAX_WORDS:-24}
      NARRATION_MAX_ATEMPO_ADJUSTMENT_PERCENT: ${NARRATION_MAX_ATEMPO_ADJUSTMENT_PERCENT:-10}
      VIDEO_PROVIDER: ${VIDEO_PROVIDER:-mock}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-/app/storage}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      APP_ACCESS_PASSWORD: ${APP_ACCESS_PASSWORD:-}
      APP_SESSION_SECRET: ${APP_SESSION_SECRET:-}
      SOCIAL_TOKEN_ENCRYPTION_KEY: ${SOCIAL_TOKEN_ENCRYPTION_KEY:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
      GOOGLE_OAUTH_FRONTEND_SUCCESS_URL: ${GOOGLE_OAUTH_FRONTEND_SUCCESS_URL:-}
      GOOGLE_OAUTH_FRONTEND_ERROR_URL: ${GOOGLE_OAUTH_FRONTEND_ERROR_URL:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/storage:/app/storage

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
      VITE_VIDEO_PROVIDER: ${VIDEO_PROVIDER:-mock}
      VITE_STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
    ports:
      - "5173:5173"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sociopost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sociopost"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery_worker:
    build:
      context: ./backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/sociopost
      REDIS_URL: redis://redis:6379/0
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-http://localhost:8000/assets}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-socipost-assets}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RUNWAY_API_KEY: ${RUNWAY_API_KEY:-}
      SEMANTIC_CRITIC_ENABLED: ${SEMANTIC_CRITIC_ENABLED:-false}
      SEMANTIC_CRITIC_PROVIDER: ${SEMANTIC_CRITIC_PROVIDER:-openai}
      SEMANTIC_CRITIC_MODEL: ${SEMANTIC_CRITIC_MODEL:-gpt-4.1-mini}
      SEMANTIC_CRITIC_VERSION: ${SEMANTIC_CRITIC_VERSION:-v1}
      SEMANTIC_CRITIC_TIMEOUT_SECONDS: ${SEMANTIC_CRITIC_TIMEOUT_SECONDS:-60}
      NARRATION_ENABLED: ${NARRATION_ENABLED:-false}
      NARRATION_WRITER_PROVIDER: ${NARRATION_WRITER_PROVIDER:-mock}
      NARRATION_WRITER_MODEL: ${NARRATION_WRITER_MODEL:-gpt-4.1-mini}
      NARRATION_WRITER_PROMPT_VERSION: ${NARRATION_WRITER_PROMPT_VERSION:-v1}
      NARRATION_SPEECH_PROVIDER: ${NARRATION_SPEECH_PROVIDER:-mock}
      NARRATION_SPEECH_MODEL: ${NARRATION_SPEECH_MODEL:-gpt-4o-mini-tts}
      NARRATION_VOICE: ${NARRATION_VOICE:-alloy}
      NARRATION_VERSION: ${NARRATION_VERSION:-v1}
      NARRATION_CAPTION_VERSION: ${NARRATION_CAPTION_VERSION:-v1}
      NARRATION_RENDER_VERSION: ${NARRATION_RENDER_VERSION:-v1}
      NARRATION_TIMEOUT_SECONDS: ${NARRATION_TIMEOUT_SECONDS:-90}
      NARRATION_MAX_WORDS: ${NARRATION_MAX_WORDS:-24}
      NARRATION_MAX_ATEMPO_ADJUSTMENT_PERCENT: ${NARRATION_MAX_ATEMPO_ADJUSTMENT_PERCENT:-10}
      VIDEO_PROVIDER: ${VIDEO_PROVIDER:-mock}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-/app/storage}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      APP_ACCESS_PASSWORD: ${APP_ACCESS_PASSWORD:-}
      APP_SESSION_SECRET: ${APP_SESSION_SECRET:-}
      SOCIAL_TOKEN_ENCRYPTION_KEY: ${SOCIAL_TOKEN_ENCRYPTION_KEY:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
      GOOGLE_OAUTH_FRONTEND_SUCCESS_URL: ${GOOGLE_OAUTH_FRONTEND_SUCCESS_URL:-}
      GOOGLE_OAUTH_FRONTEND_ERROR_URL: ${GOOGLE_OAUTH_FRONTEND_ERROR_URL:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/storage:/app/storage

  celery_beat:
    build:
      context: ./backend
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/sociopost
      REDIS_URL: redis://redis:6379/0
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-socipost-assets}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-http://localhost:8000/assets}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RUNWAY_API_KEY: ${RUNWAY_API_KEY:-}
      SEMANTIC_CRITIC_ENABLED: ${SEMANTIC_CRITIC_ENABLED:-false}
      SEMANTIC_CRITIC_PROVIDER: ${SEMANTIC_CRITIC_PROVIDER:-openai}
      SEMANTIC_CRITIC_MODEL: ${SEMANTIC_CRITIC_MODEL:-gpt-4.1-mini}
      SEMANTIC_CRITIC_VERSION: ${SEMANTIC_CRITIC_VERSION:-v1}
      SEMANTIC_CRITIC_TIMEOUT_SECONDS: ${SEMANTIC_CRITIC_TIMEOUT_SECONDS:-60}
      NARRATION_ENABLED: ${NARRATION_ENABLED:-false}
      NARRATION_WRITER_PROVIDER: ${NARRATION_WRITER_PROVIDER:-mock}
      NARRATION_WRITER_MODEL: ${NARRATION_WRITER_MODEL:-gpt-4.1-mini}
      NARRATION_WRITER_PROMPT_VERSION: ${NARRATION_WRITER_PROMPT_VERSION:-v1}
      NARRATION_SPEECH_PROVIDER: ${NARRATION_SPEECH_PROVIDER:-mock}
      NARRATION_SPEECH_MODEL: ${NARRATION_SPEECH_MODEL:-gpt-4o-mini-tts}
      NARRATION_VOICE: ${NARRATION_VOICE:-alloy}
      NARRATION_VERSION: ${NARRATION_VERSION:-v1}
      NARRATION_CAPTION_VERSION: ${NARRATION_CAPTION_VERSION:-v1}
      NARRATION_RENDER_VERSION: ${NARRATION_RENDER_VERSION:-v1}
      NARRATION_TIMEOUT_SECONDS: ${NARRATION_TIMEOUT_SECONDS:-90}
      NARRATION_MAX_WORDS: ${NARRATION_MAX_WORDS:-24}
      NARRATION_MAX_ATEMPO_ADJUSTMENT_PERCENT: ${NARRATION_MAX_ATEMPO_ADJUSTMENT_PERCENT:-10}
      VIDEO_PROVIDER: ${VIDEO_PROVIDER:-mock}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-/app/storage}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      APP_ACCESS_PASSWORD: ${APP_ACCESS_PASSWORD:-}
      APP_SESSION_SECRET: ${APP_SESSION_SECRET:-}
      SOCIAL_TOKEN_ENCRYPTION_KEY: ${SOCIAL_TOKEN_ENCRYPTION_KEY:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
      GOOGLE_OAUTH_FRONTEND_SUCCESS_URL: ${GOOGLE_OAUTH_FRONTEND_SUCCESS_URL:-}
      GOOGLE_OAUTH_FRONTEND_ERROR_URL: ${GOOGLE_OAUTH_FRONTEND_ERROR_URL:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/storage:/app/storage

volumes:
  postgres_data:
