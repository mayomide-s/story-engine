services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL}
      RUNWAY_API_KEY: ${RUNWAY_API_KEY}
      VIDEO_PROVIDER: ${VIDEO_PROVIDER:-runway}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-r2}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      APP_ACCESS_PASSWORD: ${APP_ACCESS_PASSWORD}
      APP_SESSION_SECRET: ${APP_SESSION_SECRET:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_VIDEO_PROVIDER: ${VIDEO_PROVIDER:-runway}
      VITE_STORAGE_PROVIDER: ${STORAGE_PROVIDER:-r2}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sociopost}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sociopost}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL}
      RUNWAY_API_KEY: ${RUNWAY_API_KEY}
      VIDEO_PROVIDER: ${VIDEO_PROVIDER:-runway}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-r2}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      APP_ACCESS_PASSWORD: ${APP_ACCESS_PASSWORD}
      APP_SESSION_SECRET: ${APP_SESSION_SECRET:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
